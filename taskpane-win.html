<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script><style>* { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #FAFAFA;
      color: #333;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #0F1B2D;
    }
    .section { margin-bottom: 20px; }
    .section h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 6px;
    }
    .grid-btn {
      width: 44px; height: 44px;
      border: 1px solid #DDD;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.15s;
    }
    .grid-btn:hover { background: #E8E8E8; border-color: #AAA; }
    .grid-btn:active { background: #D0D0D0; }
    .grid-btn.selected { border-color: #C4A35A; background: #FFF8EB; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .input-row label {
      font-size: 13px;
      min-width: 60px;
    }
    .input-row input, .input-row select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #CCC;
      border-radius: 4px;
      font-size: 13px;
    }
    .btn-primary {
      background: #0F1B2D;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
    }
    .btn-primary:hover { background: #1A2B3D; }
    .btn-primary:active { background: #0A1220; }
    .status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
    #pane-container { display: none; }</style><script defer="defer" src="taskpane-win.bundle.js?v=5"></script></head><body><div id="pane-container"></div><div id="loading">Loading...</div></body></html>
